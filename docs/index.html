<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="robots" content="noindex, nofollow" />
  <title>Pseudo-Server</title>
  <style>
    html {
      scroll-behavior: smooth;
      background-color: #020617;
      word-wrap: break-word;
      overflow-wrap: break-word;
      padding: 0 384px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;

      @media (max-width: 1800px) {
        padding: 0 300px;
      }

      @media (max-width: 1600px) {
        padding: 0 200px;
      }

      @media (max-width: 1400px) {
        padding: 0 100px;
      }

      @media (max-width: 1200px) {
        padding: 0 20px;
      }

      @media (max-width: 767px) {
        padding: 0;

    }

    body {
      background-color: #334155;
      color: #eee;
      font-family: Arial, sans-serif;
      border-radius: 20px;
      padding: 20px;
      font-size: 22px;

      @media (max-width: 615px) {
        font-size: 18px;
      }
    }

    li {
      margin-bottom: 20px;
    }

    a,
    li::marker,
    .accent {
      color: #fbbf24;
    }

    a:hover,
    a:visited {
      color: #f9d57b;
    }

    a[download] {
      border-radius: 20px;
      background-color: #020617;
      padding: 20px;
      display: block;
      margin: auto;
      width: fit-content;
      transition: cubic-bezier(0.075, 0.82, 0.165, 1);
      transition-duration: 500ms;
      text-align: center;

      @media (max-width: 650px) {
        font-size: 18px !important;
        border-radius: 10px;
        background-color: #020617;
        padding: 10px;
      }
    }

    a[download]:hover {
      background-color: #4ade80;
    }

    h1 {
      text-align: center;

      @media (max-width: 615px) {
        font-size: xx-large !important;
      }
    }

    h3 {
      @media (max-width: 615px) {
        font-size: larger !important;
      }
    }

    h1,
    h2,
    h3 {
      color: #020617;

      @media (max-width: 615px) {
        font-size: x-large;
      }
    }
  </style>
</head>
